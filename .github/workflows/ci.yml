name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract-drift:
    name: Contract drift (OpenAPI → TS + Go types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @questlog/types generate
      - run: git diff --exit-code -- packages/types/src/generated
        # Fails if generated types don't match api/openapi.yaml as committed —
        # the drift problem the reference architecture article admits to.
      - uses: actions/setup-go@v5
        with: { go-version: "1.26", cache-dependency-path: backend/go.sum }
      - working-directory: backend/internal/shared/api
        run: go generate ./...
      - run: git diff --exit-code -- backend/internal/shared/api/generated

  ts-lint-typecheck-test:
    name: TS lint, typecheck, test
    runs-on: ubuntu-latest
    needs: contract-drift
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck

  go-lint-vet-test:
    name: Go lint, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26", cache-dependency-path: backend/go.sum }
      - working-directory: backend
        run: go build ./... && go vet ./... && go test ./... -race
      - working-directory: backend
        run: go tool golangci-lint run ./...
        # Pinned via backend/tools/go.mod's `tool` directive — not the
        # golangci-lint-action, whose `version: latest` resolved to a stale
        # v1.64.8 built with go1.24 and choked on Fiber's go1.25/1.26-gated
        # transitive deps ("undefined: fiber"). Pinning it as a real go.sum
        # dependency removes that whole class of drift.

  docker-build:
    name: Docker build (all images)
    runs-on: ubuntu-latest
    needs: [ts-lint-typecheck-test, go-lint-vet-test]
    strategy:
      matrix:
        include:
          - dockerfile: deploy/Dockerfile.go
            build-args: CMD_PATH=cmd/public-api
          - dockerfile: deploy/Dockerfile.go
            build-args: CMD_PATH=cmd/admin-api
          - dockerfile: deploy/Dockerfile.node
            build-args: APP=web
          - dockerfile: deploy/Dockerfile.node
            build-args: APP=admin
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: false
